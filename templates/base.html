<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Archetype Retreats{% endblock %}</title>

  <!-- Shared stylesheet -->
  <link rel="stylesheet" href="/static/css/style.css?v=31">
  {% block page_css %}{% endblock %}
  {% block extra_css %}{% endblock %}
  <script async src="https://widgets.givebutter.com/latest.umd.cjs?acct=rHSylAIh3LQkstsI&p=other"></script>
</head>

<body class="{% block body_class %}{% endblock %}">
  <header class="site-header">
    <div class="site-header__inner">
      <a class="site-title" href="{{ url_for('home') }}">Archetype Retreats</a>

      <nav class="site-nav" aria-label="Primary">
  <a href="{{ url_for('home') }}">Home</a>
  <a href="/start">Begin</a></li>
  <a href="{{ url_for('book_page') }}">Books</a>
  <a href="/retreats">Retreats</a>
  <a href="{{ url_for('contact') }}">Contact</a>
</nav>

      <!-- spacer column (keeps nav centered visually) -->
      <div class="site-header__spacer" aria-hidden="true"></div>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    © <span id="year"></span> Archetype Retreats
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
